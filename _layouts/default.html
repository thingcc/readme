<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | {{ site.title }}</title>
    <link rel="shortcut icon" href="https://readme.thing.cc/favicon.ico" type="image/x-icon">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; line-height: 1.6; padding: 20px; max-width: 1000px; margin: 0 auto; }
        nav { background: #f5f5f5; border-radius: 8px; padding: 12px 20px; margin-bottom: 30px; display: flex; gap: 20px; flex-wrap: wrap; border-bottom: 2px solid #e0e0e0; }
        nav a { text-decoration: none; color: #0366d6; font-weight: 500; padding: 6px 12px; border-radius: 6px; transition: background 0.2s; }
        nav a:hover { background: #e1e4e8; }
        nav a.active { background: #0366d6; color: white; }
        @media (max-width: 600px) { nav { justify-content: center; } }
        .content { padding: 0 10px; }
        footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid #eee; text-align: center; font-size: 0.9em; color: #666; }
    </style>
</head>
<body>
    <nav>
        <a href="{{ site.baseurl }}/" {% if page.url == "/" %}class="active"{% endif %}>🏠 首页</a>
        <a href="{{ site.baseurl }}/Feishu2ChromeReadme" {% if page.url contains "Feishu2ChromeReadme" %}class="active"{% endif %}>📊 飞书OKR增强</a>
        <a href="{{ site.baseurl }}/Dida2ChromeReadme" {% if page.url contains "Dida2ChromeReadme" %}class="active"{% endif %}>✅ 滴答清单助手</a>
        <!-- 新增页面，直接在这里加一行即可 -->
    </nav>
    <div class="content">
        {{ content }}
    </div>
    <footer>
        © 2026 Thing.CC | All Rights Reserved
    </footer>
</body>
</html>
